apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: bbs-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bbs-grafana
  template:
    metadata:
      labels:
        app: bbs-grafana
    spec:
      # control-plane ノードにもスケジューリング可（シングルノード用）
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: grafana
          image: grafana/grafana-oss:12.4.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # 接続情報・管理者パスワードは Secret から:
          #   kubectl create secret generic bbs-grafana-env -n bbs-grafana --from-env-file=.env
          # (.env のキーは docker-compose 用の .env.example と同じ)
          envFrom:
            - secretRef:
                name: bbs-grafana-env
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: bbs-grafana-env
                  key: GF_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bbs-grafana-env
                  key: GF_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              valueFrom:
                secretKeyRef:
                  name: bbs-grafana-env
                  key: GF_ROOT_URL
            # 匿名閲覧(公開用)。ViewerロールなのでダッシュボードのSQLは編集不可
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_AUTH_ANONYMOUS_HIDE_VERSION
              value: "true"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/bbs-posts.json

          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            # 状態はすべてプロビジョニングで再現できるので永続化しない。
            # 必要になったら PVC に差し替える。
            - name: data
              mountPath: /var/lib/grafana

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          emptyDir: {}
